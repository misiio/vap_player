name: vap_player
description: Flutter VAP player widget/controller API.
version: 0.1.0
homepage: https://github.com/Tencent/vap
publish_to: 'none'

environment:
  sdk: ^3.10.4
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  vap_player_platform_interface:
    path: ../vap_player_platform_interface
  vap_player_android:
    path: ../vap_player_android
  vap_player_ios:
    path: ../vap_player_ios

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: vap_player_android
      ios:
        default_package: vap_player_ios
