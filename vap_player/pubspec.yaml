name: flutter_vap_player
description: Flutter VAP player widget/controller API.
version: 0.2.0
homepage: https://github.com/misiio/vap_player
repository: https://github.com/misiio/vap_player/tree/master/vap_player

environment:
  sdk: ^3.10.4
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  vap_player_platform_interface: ^0.2.0
  vap_player_android: ^0.2.0
  vap_player_ios: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: vap_player_android
      ios:
        default_package: vap_player_ios
